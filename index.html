<!DOCTYPE html>

<head>

    <link rel="icon" type="image/svg+xml" href="image/igreenlogo.svg">

    <div class="container flex bg-black">
        <div class="left">
            <div class="close">
                <img class="invert" src="image/close.svg" alt="">

                <div class="logo"><img class="invert" src="image/logo.svg" alt=""></div>

                    <li><img class="invert" src="image/search.svg" alt="Search">Search</li>
                </ul>
            </div>
            <div class="library p-1 bg-gray round">
                <div class="heading">
                    <h2>Your Library</h2>
                    <img class="invert" src="image/pluse.svg" alt="">
                </div>
                <div class="songlist">
                    <ul class="p-1"></ul>
                </div>
                <div class="footer">
                    <div>
                        <a href="https://www.spotify.com/in-en/legal/">
                            <span>Legal</span>
                        </a>
                    </div>

                    <div>
                        <a href="https://www.spotify.com/in-en/safetyandprivacy/">
                            <span>Safety & Privacy Center</span>
                        </a>
                    </div>

                    <div>
                        <a href="https://www.spotify.com/in-en/legal/privacy-policy/">
                            <span>Privacy Policy</span>
                        </a>

                        <a href="https://www.spotify.com/in-en/legal/privacy-policy/#s3">
                            <span>About Ads</span>
                        </a>
                    </div>

                    <div>
                        <a href="https://www.spotify.com/in-en/accessibility/">
                            <span>Accessibility</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <div class="right bg-gray round">
            <div class="header">
                <div class="nav">
                    <div class="menu-icons">
                        <img class="hamburgerContainer invert" src="image/hamburger.svg" alt="">

                            <path d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18"></path>
                        </svg>
                    </div>
                </div>
                <div class="buttons">
                    <button class="signbutton">Sign up</button>
                    <button class="loginbutton">Log in</button>
                </div>
            </div>

                <div class="playbar">
                    <div class="songbar">
                        <div class="songinfo"></div>
                        <div class="songbuttons">
                            <img id="previous" src="image/songprev.svg" alt="">
                            <img id="play" src="image/songplay.svg" alt="">
                            <img id="next" src="image/songnext.svg" alt="">
                        </div>
                        <div class="timevolume">
                            <div class="songtime"></div>
                            <div class="volume">
                                <img class="invert" src="image/volume.svg" alt="">
                                <div class="range">
                                    <input type="range" name="volume">
                                </div>
                            </div>
